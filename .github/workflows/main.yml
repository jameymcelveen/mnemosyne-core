name: Mnemosyne CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'
      - run: npm install --prefix app || echo 'No app found yet'
      - run: echo 'Memory check passed' 
